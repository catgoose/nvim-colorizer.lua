name: Format
on:
  push:
    branches: [master]
permissions:
  contents: write
  pull-requests: write
jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install StyLua
        run: |
          STYLUA_VERSION="v2.0.2"
          curl -fsSL "https://github.com/JohnnyMorganz/StyLua/releases/download/${STYLUA_VERSION}/stylua-linux-x86_64.zip" \
            -o stylua.zip
          unzip stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua
      - name: Run StyLua
        run: stylua lua/
      - name: Create PR for formatting
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "style: auto-format with StyLua"
          title: "style: auto-format with StyLua"
          body: "Auto-formatted Lua files with StyLua."
          branch: style/auto-format
          add-paths: lua/
      - name: Auto-approve format PR
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.cpr.outputs.pull-request-number }},
              event: 'APPROVE',
              body: 'Auto-approved: StyLua formatting'
            })
