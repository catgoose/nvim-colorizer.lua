name: Screenshots

on:
  workflow_dispatch:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: nightly

      - uses: ./.github/actions/setup-vhs

      - name: Generate screenshots
        run: nvim --headless -l scripts/screenshots/generate.lua

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: scripts/screenshots/output/*.png

  publish:
    runs-on: ubuntu-latest
    needs: [screenshots]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: output

      - name: Push to screenshots branch
        run: |
          cd output
          git init -b screenshots
          git add *.png
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "Update screenshots [skip ci]"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            screenshots
